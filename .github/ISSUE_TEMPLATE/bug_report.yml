name: "🐛 Bug Report"
description: Report something broken in matdata-app
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Note: security vulnerabilities found by CodeQL are filed automatically — use this form only for bugs found through normal usage or testing.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Low — cosmetic/minor"
        - "Medium — affects functionality"
        - "High — blocks core flow"
        - "Critical — data loss / crash"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Browser, OS, Node version, etc."
    validations:
      required: false
